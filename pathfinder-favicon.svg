<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Pathfinder — Favicon / App-ikon
    Bakgrund:   #1a1a2e
    Nål N:      #e85d26
    C:          #ffffff
    V:          #f0c040
  -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>

  <g transform="translate(32, 26)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
    <line x1="0" y1="-18" x2="0" y2="-14" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="0" y1="14" x2="0" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-18" y1="0" x2="-14" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="14" y1="0" x2="18" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
    <polygon points="0,-13 -3,2 0,-1.5 3,2" fill="#e85d26"/>
    <polygon points="0,13 -3,-2 0,1.5 3,-2" fill="rgba(255,255,255,0.2)"/>
    <circle cx="0" cy="0" r="2.5" fill="#1a1a2e" stroke="#e85d26" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="1.2" fill="#e85d26"/>
  </g>

  <text x="26" y="53" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#ffffff">C</text>
  <text x="34" y="53" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#f0c040">V</text>
</svg>
