<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <style>
    .bg-card { fill: #1a1a2e; }
    .txt-main { fill: #ffffff; }
    .txt-accent { fill: #f0c040; }
    .txt-sub { fill: rgba(255,255,255,0.45); }
    .compass-ring { stroke: rgba(255,255,255,0.18); }
    .compass-ring-inner { stroke: rgba(255,255,255,0.08); }
    .compass-tick { stroke: rgba(255,255,255,0.25); }
    .compass-ew { stroke: rgba(255,255,255,0.12); }
    .compass-label { fill: rgba(255,255,255,0.45); font-family: Georgia,serif; font-size: 13px; font-weight: 700; }
    .divider { stroke: rgba(255,255,255,0.1); }
  </style>

  <rect x="80" y="20" width="520" height="380" rx="24" class="bg-card"/>

  <!-- KOMPASS -->
  <g transform="translate(340, 170)">
    <circle cx="0" cy="0" r="110" fill="none" class="compass-ring" stroke-width="1"/>
    <g class="compass-tick" stroke-width="1">
      <line x1="0" y1="-110" x2="0" y2="-102"/>
      <line x1="0" y1="102" x2="0" y2="110"/>
      <line x1="-110" y1="0" x2="-102" y2="0"/>
      <line x1="102" y1="0" x2="110" y2="0"/>
    </g>
    <g class="compass-tick" stroke-width="0.5" opacity="0.5">
      <line x1="55" y1="-95" x2="51" y2="-88"/>
      <line x1="95" y1="-55" x2="88" y2="-51"/>
      <line x1="95" y1="55" x2="88" y2="51"/>
      <line x1="55" y1="95" x2="51" y2="88"/>
      <line x1="-55" y1="95" x2="-51" y2="88"/>
      <line x1="-95" y1="55" x2="-88" y2="51"/>
      <line x1="-95" y1="-55" x2="-88" y2="-51"/>
      <line x1="-55" y1="-95" x2="-51" y2="-88"/>
    </g>
    <circle cx="0" cy="0" r="85" fill="none" class="compass-ring" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="62" fill="none" class="compass-ring-inner" stroke-width="1"/>
    <line x1="0" y1="-85" x2="0" y2="85" class="compass-ew" stroke-width="1"/>
    <line x1="-85" y1="0" x2="85" y2="0" class="compass-ew" stroke-width="1"/>
    <line x1="-60" y1="-60" x2="60" y2="60" class="compass-ew" stroke-width="0.5" opacity="0.5"/>
    <line x1="60" y1="-60" x2="-60" y2="60" class="compass-ew" stroke-width="0.5" opacity="0.5"/>
    <text x="0" y="-92" text-anchor="middle" class="compass-label">N</text>
    <text x="0" y="106" text-anchor="middle" class="compass-label">S</text>
    <text x="118" y="5" text-anchor="middle" dominant-baseline="central" class="compass-label">E</text>
    <text x="-118" y="5" text-anchor="middle" dominant-baseline="central" class="compass-label">W</text>
    <polygon points="0,-72 -9,4 0,-4 9,4" fill="#e85d26"/>
    <polygon points="0,72 -9,-4 0,4 9,-4" fill="rgba(255,255,255,0.2)"/>
    <polygon points="58,0 2,-5 4,0 2,5" fill="rgba(255,255,255,0.15)"/>
    <polygon points="-58,0 -2,-5 -4,0 -2,5" fill="rgba(255,255,255,0.15)"/>
    <circle cx="0" cy="0" r="7" fill="#1a1a2e" stroke="#e85d26" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#e85d26"/>
  </g>

  <!-- Textlogga -->
  <text x="340" y="318"
        text-anchor="middle"
        font-family="Georgia,serif"
        font-size="52"
        font-weight="700"
        class="txt-main">Path<tspan class="txt-accent">finder</tspan></text>

  <!-- Divider -->
  <line x1="200" y1="336" x2="480" y2="336" class="divider" stroke-width="1"/>

  <!-- Undertitel -->
  <text x="340" y="358"
        text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="14"
        font-weight="400"
        letter-spacing="2.5"
        class="txt-sub">CV &amp; Matchning med hjälp av AI</text>

</svg>
